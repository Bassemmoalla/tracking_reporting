spring.application.name=tracking_reporting
server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/tracking_reporting?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:tracking_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:tracking_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
server.error.include-message=always

spring.security.oauth2.resourceserver.jwt.issuer-uri=${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:http://localhost:8081/realms/tracking-reporting}
#spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI:}

# AWS S3
app.aws.region=us-east-1
app.aws.s3.bucket=tracking-reporting-reports
app.aws.s3.base-folder=generated-reports
app.aws.s3.access-key=admin
app.aws.s3.secret-key=password123
app.aws.s3.endpoint=http://minio:9000

# Elasticsearch
app.elasticsearch.url=http://elasticsearch:9200
app.elasticsearch.report-index=generated_reports
app.elasticsearch.metrics-index=project_metrics

# Optional GitLab fallback
app.gitlab.base-url=https://gitlab.example.com/api/v4
app.gitlab.token=CHANGE_ME

# Report generation
#app.report.signed-url-expiration-minutes=60